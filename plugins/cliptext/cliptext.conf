# Geany's cliptext configuration file
#
# use \n for a new line (it will be replaced by the used EOL char(s) - LF, CR/LF, CR).
# use \t for an indentation step, it will be replaced according to the current document's indent mode.
# use \s to force whitespace at beginning or end of a value ('key= value' won't work, use 'key=\svalue').
# use \\ when you need a single backslash
# use %sel% for insertion selected text
# use 'space' if you need value started with # (key= #value), without space it will be missed as comment

